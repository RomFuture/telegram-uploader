name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_tag_check:
        description: "Skip tag vs pyproject version check (manual rebuild)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push' || inputs.skip_tag_check != 'true'
        run: ./scripts/check_release_version.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest (unit)
        run: pytest -m "not integration" -v

  build-deb:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push' || inputs.skip_tag_check != 'true'
        run: ./scripts/check_release_version.sh

      - name: Read version
        id: version
        run: |
          echo "version=$(./scripts/read_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Install nfpm
        run: |
          curl -sSL -o /tmp/nfpm.deb "https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Install gettext (envsubst)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Build .deb
        run: ./scripts/build_deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-uploader-deb
          path: dist/telegram-uploader_*.deb

  release:
    runs-on: ubuntu-latest
    needs: build-deb
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION="$(./scripts/read_version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: telegram-uploader-deb
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/telegram-uploader_*.deb
          generate_release_notes: true
          body: |
            ## Requirements

            - Ubuntu 24.04 **amd64**
            - Docker + Compose plugin (installed as package dependencies)
            - Telegram: [my.telegram.org](https://my.telegram.org) API app + private backup group

            ## Clean install

            ```bash
            # 1. Install package (+ dependencies)
            sudo apt update
            sudo apt install ./telegram-uploader_${{ steps.version.outputs.version }}_amd64.deb
            telegram-uploader-check-deps

            # If Docker is not reachable:
            #   sudo systemctl enable --now docker
            #   sudo usermod -aG docker $USER
            #   log out and back in, then re-run check-deps

            # 2. Create config (once)
            telegram-uploader --setup

            # 3. Start stack + GUI
            telegram-uploader
            ```

            **In the GUI (first time):**

            1. **Settings → Client API** — API ID and API hash from [my.telegram.org](https://my.telegram.org)
            2. **Settings → General** — Target chat ID = backup **group** id (`-100…`, not your user id)
            3. **Save**
            4. **Sign in to Telegram…** (or `telegram-uploader-login` in a terminal)
            5. **Test Client API** — confirms upload to your group
            6. **Add file → Backup**

            Config: `~/.config/telegram-uploader/.env` · Session: `~/.config/telegram-uploader/session.session`

            More detail: [README § Clean install](https://github.com/RomFuture/telegram-uploader#clean-install-first-time) · [TELEGRAM_SETUP.md](https://github.com/RomFuture/telegram-uploader/blob/main/docs/TELEGRAM_SETUP.md)

            ## Upgrade

            ```bash
            docker compose -f /opt/telegram-uploader/docker-compose.yml down
            sudo apt install ./telegram-uploader_${{ steps.version.outputs.version }}_amd64.deb
            telegram-uploader
            ```

            No `--setup` or re-login unless you changed accounts. See [README § Upgrading](https://github.com/RomFuture/telegram-uploader#upgrading-deb-users).
